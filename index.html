<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills Test</title>
</head>
<body>

    <div class="Seatwork Apps">
        <div id="form-box">
            <h4 class="title mb-3">Login to Account</h4>

            <input type="text" id="username" class="form-control mb-2" placeholder="Username">
            
            <input type="password" id="password" class="form-control mb-2" placeholder="Password">

            <div class="form-check text-start">
                <input class="form-check-input" type="checkbox" id="checkboxID" onclick="showMessage()">
                <label class="form-check-label">Remember me</label>
            </div>

            <p id="message"></p>
            
            <button class="btn btn-primary" onclick="login()">Login</button>
        </div> 
    </div>

    <script>
        function showMessage() {
            var checkbox = document.getElementById("checkboxID");
            var message = document.getElementById("message");

            if (checkbox.checked) {
                message.textContent = "Remembered ✅";
            } else {
                message.textContent = "Not Remembered ❌";
            }
        }

        function login() {
            let username = document.getElementById("username").value;
            let password = document.getElementById("password").value;


            if (username === "Username" && password === "Password") {
                alert("Login successful!");
                window.location.href = "notebooks.html";

            } else {
                alert("Invalid username or password.");
            }
        }
    </script>
    
</body>
</html>
